<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SkibidiMath UAE - Math Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #00968820 0%, #FF000020 50%, #00000020 100%);
            min-height: 100vh;
            padding: 10px;
            transition: all 0.3s;
        }

        body.rtl {
            direction: rtl;
            text-align: right;
        }

        .game-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .game-container {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 3px solid #000000;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .header h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #009688, #FF0000, #000000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
        }

        .header-top-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .language-toggle {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .lang-btn {
            padding: 6px 12px;
            border: 2px solid #009688;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: #009688;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: #f7f7f7;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 0 #cbd5e0;
        }

        .stat-label {
            display: block;
            color: #666;
            font-size: 0.75rem;
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a5568;
        }

        .badge-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }

        .uae-badge {
            display: inline-block;
            background: #009688;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .visitor-badge {
            display: inline-block;
            vertical-align: middle;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .mode-btn {
            padding: 10px 5px;
            border: none;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #e2e8f0;
            color: #4a5568;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .mode-btn.active {
            background: #009688;
            color: white;
            box-shadow: 0 4px 0 #00695c;
            transform: translateY(-2px);
        }

        .mode-btn.uae-highlight {
            border: 2px solid #FF0000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .grade-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }

        .grade-btn {
            padding: 8px 5px;
            border: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #e2e8f0;
            color: #4a5568;
        }

        .grade-btn.active {
            background: #009688;
            color: white;
            box-shadow: 0 4px 0 #00695c;
            transform: translateY(-2px);
        }

        .mode-display {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: center;
        }

        .game-area {
            background: #f0f4f8;
            padding: 20px 15px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .question-box {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 20px;
            color: #2d3748;
            font-weight: bold;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            word-break: break-word;
        }

        .uae-flag-icon {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            background: linear-gradient(90deg, #009688 33%, #FF0000 33%, #FF0000 66%, #000000 66%);
            display: inline-block;
            margin: 0 5px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #cbd5e0;
            padding: 15px;
            font-size: 1.5rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 0 #a0aec0;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #a0aec0;
            background: #e2e8f0;
        }

        .option-btn.correct {
            background: #48bb78;
            color: white;
            border-color: #2f855a;
            box-shadow: 0 4px 0 #276749;
        }

        .option-btn.wrong {
            background: #f56565;
            color: white;
            border-color: #c53030;
            box-shadow: 0 4px 0 #9b2c2c;
        }

        .feedback {
            text-align: center;
            font-size: 1.3rem;
            min-height: 50px;
            font-weight: bold;
            padding: 15px;
        }

        .character-bar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: linear-gradient(135deg, #9f7aea, #667eea);
            color: white;
            padding: 12px 15px;
            border-radius: 50px;
            margin-top: 15px;
            text-align: center;
        }

        .character-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chat-container {
            background: white;
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 500px;
            border: 3px solid #000000;
            margin-top: 20px;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #009688, #FF0000, #000000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.9rem;
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 90%;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .message-content {
            background: #f0f4f8;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .message.user .message-content {
            background: #009688;
            color: white;
        }

        .chat-input {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #e2e8f0;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 0.9rem;
            outline: none;
        }

        .chat-input button {
            width: 45px;
            height: 45px;
            background: #009688;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #00695c;
            transition: all 0.3s;
        }

        .kofi-button {
            text-align: center;
            margin: 20px 0 10px;
        }

        .kofi-button img {
            max-width: 200px;
            height: auto;
        }

        /* Desktop styles */
        @media (min-width: 900px) {
            body {
                padding: 20px;
            }
            
            .game-wrapper {
                grid-template-columns: 1fr 350px;
            }
            
            .header {
                flex-direction: row;
                justify-content: space-between;
            }
            
            .stats {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .mode-selector {
                grid-template-columns: repeat(5, 1fr);
            }
            
            .options-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .character-bar {
                flex-direction: row;
                justify-content: space-between;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }

        /* Small phone adjustments */
        @media (max-width: 400px) {
            .question-box {
                font-size: 1.5rem;
            }
            
            .option-btn {
                font-size: 1.2rem;
                padding: 12px;
            }
            
            .grade-btn {
                font-size: 0.8rem;
                padding: 6px 3px;
            }
            
            .mode-btn {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="header">
                <h1>🧮 SKIBIDI MATH UAE</h1>
                <div class="header-top-row">

                <div class="stat-box">
                    <span class="stat-label" data-en="Questions" data-ar="الأسئلة">Questions</span>
                    <span class="stat-value" id="questionsDone">0</span>
                </div>
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" onclick="setGameMode('classic')">
                    <span>🎮</span>
                    <span data-en="Classic" data-ar="كلاسيكي">Classic</span>
                </button>
                <button class="mode-btn" onclick="setGameMode('suddendeath')">
                    <span>💀</span>
                    <span data-en="Sudden Death" data-ar="الموت">Sudden</span>
                </button>
                <button class="mode-btn" onclick="setGameMode('timeattack')">
                    <span>⏱️</span>
                    <span data-en="Time Attack" data-ar="هجوم">Time</span>
                </button>
                <button class="mode-btn" onclick="setGameMode('spacerace')">
                    <span>🚀</span>
                    <span data-en="Space Race" data-ar="سباق">Space</span>
                </button>

                    <span>🇦🇪</span>
                    <span data-en="UAE" data-ar="الإمارات">UAE</span>
                </button>
            </div>

            <div class="grade-selector">
                <button class="grade-btn" onclick="changeGrade(4)">G4</button>
                <button class="grade-btn active" onclick="changeGrade(5)">G5</button>
                <button class="grade-btn" onclick="changeGrade(6)">G6</button>
                <button class="grade-btn" onclick="changeGrade(7)">G7</button>
            </div>

            <div class="mode-display" id="modeDisplay">
                <div id="modeStatus">Classic Mode</div>
                <div id="modeDetails"></div>
            </div>

            <div class="game-area">
                <div class="question-box" id="question">
                    <span class="uae-flag-icon"></span>
                    Loading...

                </div>

                <div class="options-grid" id="options"></div>
                <div class="feedback" id="feedback"></div>
            </div>

            <div class="character-bar">
                <div class="character-info">
                    <span>Current:</span>

                </div>
                <div class="character-info">
                    <span>Next:</span>

            switch(gameState.gameMode) {
                case 'suddendeath': gameState.lives = 3; break;
                case 'timeattack': gameState.timeBonus = 0; break;
                case 'spacerace': gameState.racePosition = 0; break;
            }
        }

        function updateModeDisplay() {
            const modeStatus = document.getElementById('modeStatus');
            const modeDetails = document.getElementById('modeDetails');
            
            if (gameState.gameMode === 'uaeheritage') {
                modeStatus.innerHTML = '🇦🇪 UAE Heritage Mode';
            } else if (gameState.gameMode === 'suddendeath') {
                modeStatus.innerHTML = '💀 Sudden Death Mode';
                modeDetails.innerHTML = `❤️ ${gameState.lives} lives left`;
            } else {
                modeStatus.innerHTML = gameState.gameMode.charAt(0).toUpperCase() + gameState.gameMode.slice(1) + ' Mode';
            }
        }

        function changeGrade(grade) {
            gameState.currentGrade = grade;
            document.querySelectorAll('.grade-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            nextQuestion();
        }

        function nextQuestion() {
            gameState.canAnswer = true;
            
            let questionPool;
            if (gameState.uaeMode) {
                questionPool = uaeQuestions;
            } else {
                questionPool = questionBank[`grade${gameState.currentGrade}`];
            }
            
            const randomIndex = Math.floor(Math.random() * questionPool.length);
            gameState.currentQuestion = questionPool[randomIndex];
            
            document.getElementById('question').innerHTML = gameState.currentQuestion.question;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            const shuffled = [...gameState.currentQuestion.options].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('feedback').textContent = '';
        }

        function checkAnswer(selected) {
            if (!gameState.canAnswer) return;
            
            gameState.canAnswer = false;
            const isCorrect = selected === gameState.currentQuestion.answer;
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.style.pointerEvents = 'none';
                if (btn.textContent === gameState.currentQuestion.answer) {
                    btn.classList.add('correct');
                } else if (btn.textContent === selected && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });
            
            handleGameMode(isCorrect);
            
            setTimeout(() => {
                nextQuestion();
            }, 1500);
        }

        function handleGameMode(isCorrect) {
            const bonus = characters[gameState.character]?.bonus || 1;
            
            if (isCorrect) {
                const points = Math.floor(10 * gameState.level * bonus);
                gameState.score += points;
                gameState.streak++;
                gameState.characterXP += 5;
                gameState.questionsDone++;
                document.getElementById('feedback').textContent = `✅ Correct! +${points} points!`;
                
                if (gameState.gameMode === 'spacerace') {
                    gameState.racePosition++;
                    if (gameState.racePosition >= gameState.raceTotal) {
                        gameState.score += 100;
                        document.getElementById('feedback').textContent = '🎉 Race Won! +100!';
                    }
                }
            } else {
                gameState.streak = 0;
                document.getElementById('feedback').textContent = '❌ Try again!';
                
                if (gameState.gameMode === 'suddendeath') {
                    gameState.lives--;
                    if (gameState.lives <= 0) {
                        document.getElementById('feedback').textContent = '💀 Game Over!';
                        resetGameMode();
                    }
                }
            }
            
            if (gameState.streak % 5 === 0 && gameState.streak > 0) {
                gameState.level++;
            }
            
            checkCharacterUnlocks();
            updateDisplay();
            updateModeDisplay();
        }

        function checkCharacterUnlocks() {
            if (gameState.characterXP >= 100 && !gameState.characterUnlocked.ninja) {
                gameState.characterUnlocked.ninja = true;
                gameState.character = 'ninja';
            }
            if (gameState.characterXP >= 500 && !gameState.characterUnlocked.wizard) {
                gameState.characterUnlocked.wizard = true;
                gameState.character = 'wizard';
            }
            if (gameState.characterXP >= 1000 && !gameState.characterUnlocked.legend) {
                gameState.characterUnlocked.legend = true;
                gameState.character = 'legend';
            }
        }

        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('streak').textContent = gameState.streak;
            document.getElementById('questionsDone').textContent = gameState.questionsDone;
            
            const character = characters[gameState.character];
            document.getElementById('currentCharacterDisplay').textContent = `${character.emoji} ${character.name}`;
            
            const xpPercent = (gameState.characterXP / 1000) * 100;
            
            if (gameState.characterXP < 100) {
                document.getElementById('nextCharacter').textContent = `🥷 Ninja (${100 - gameState.characterXP} XP needed)`;
            } else if (gameState.characterXP < 500) {
                document.getElementById('nextCharacter').textContent = `🧙 Wizard (${500 - gameState.characterXP} XP needed)`;
            } else if (gameState.characterXP < 1000) {
                document.getElementById('nextCharacter').textContent = `👑 Legend (${1000 - gameState.characterXP} XP needed)`;
            } else {
                document.getElementById('nextCharacter').textContent = `👑 Max Level!`;
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            addUserMessage(message);
            input.value = '';
            
            setTimeout(() => {
                let response = "Try UAE Heritage Mode for questions about Burj Khalifa, Falcons, and Emirati culture!";
                addBotMessage(response);
            }, 1000);
        }

        function addUserMessage(text) {
            const messages = document.getElementById('chatMessages');
            messages.innerHTML += `<div class="message user"><div class="message-avatar">👤</div><div class="message-content">${text}</div></div>`;
            messages.scrollTop = messages.scrollHeight;
        }

        function addBotMessage(text) {
            const messages = document.getElementById('chatMessages');
            messages.innerHTML += `<div class="message bot"><div class="message-avatar">🧠</div><div class="message-content">${text}</div></div>`;
            messages.scrollTop = messages.scrollHeight;
        }

        nextQuestion();
    </script>
</body>
</html>
