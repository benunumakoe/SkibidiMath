<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkibidiMath UAE - Math Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #00968820 0%, #FF000020 50%, #00000020 100%);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s;
        }

        body.rtl {
            direction: rtl;
            text-align: right;
        }

        .game-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .game-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 3px solid #000000;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #009688, #FF0000, #000000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .language-toggle {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .lang-btn {
            padding: 8px 15px;
            border: 2px solid #009688;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: #009688;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 0 #cbd5e0;
        }

        .stat-label {
            display: block;
            color: #666;
            font-size: 0.9rem;
        }

        .stat-value {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: #4a5568;
        }

        .uae-badge {
            display: inline-block;
            background: #009688;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 15px 10px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #e2e8f0;
            color: #4a5568;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .mode-btn.active {
            background: #009688;
            color: white;
            box-shadow: 0 4px 0 #00695c;
            transform: translateY(-2px);
        }

        .mode-btn.uae-highlight {
            border: 2px solid #FF0000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .grade-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .grade-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #e2e8f0;
            color: #4a5568;
        }

        .grade-btn.active {
            background: #009688;
            color: white;
            box-shadow: 0 4px 0 #00695c;
            transform: translateY(-2px);
        }

        .mode-display {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-area {
            background: #f0f4f8;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .question-box {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
            font-weight: bold;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .uae-flag-icon {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            background: linear-gradient(90deg, #009688 33%, #FF0000 33%, #FF0000 66%, #000000 66%);
            display: inline-block;
            margin: 0 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: white;
            border: 3px solid #cbd5e0;
            padding: 20px;
            font-size: 1.8rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 0 #a0aec0;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #a0aec0;
            background: #e2e8f0;
        }

        .option-btn.correct {
            background: #48bb78;
            color: white;
            border-color: #2f855a;
            box-shadow: 0 4px 0 #276749;
        }

        .option-btn.wrong {
            background: #f56565;
            color: white;
            border-color: #c53030;
            box-shadow: 0 4px 0 #9b2c2c;
        }

        .feedback {
            text-align: center;
            font-size: 1.5rem;
            min-height: 60px;
            font-weight: bold;
            padding: 20px;
        }

        .character-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #9f7aea, #667eea);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            margin-top: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 800px;
            border: 3px solid #000000;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #009688, #FF0000, #000000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-content {
            background: #f0f4f8;
            padding: 12px 18px;
            border-radius: 20px;
        }

        .message.user .message-content {
            background: #009688;
            color: white;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
        }

        .chat-input button {
            width: 50px;
            height: 50px;
            background: #009688;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #00695c;
            transition: all 0.3s;
        }

        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #00695c;
        }

        @media (max-width: 900px) {
            .game-wrapper {
                grid-template-columns: 1fr;
            }
            .mode-selector {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <h1>🧮 SKIBIDI MATH UAE</h1>
                    <span class="uae-badge">🇦🇪 500+ QUESTIONS</span>

            </div>

            <div class="stats">
                <div class="stat-box">

                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label" data-en="Level" data-ar="المستوى">Level</span>
                    <span class="stat-value" id="level">1</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label" data-en="Streak" data-ar="التتابع">Streak</span>
                    <span class="stat-value" id="streak">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label" data-en="Questions" data-ar="الأسئلة">Questions</span>
                    <span class="stat-value" id="questionsDone">0</span>
                </div>
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" onclick="setGameMode('classic')">
                    <span class="mode-emoji">🎮</span>
                    <span data-en="Classic" data-ar="كلاسيكي">Classic</span>
                </button>
                <button class="mode-btn" onclick="setGameMode('suddendeath')">
                    <span class="mode-emoji">💀</span>
                    <span data-en="Sudden Death" data-ar="الموت المفاجئ">Sudden Death</span>
                </button>
                <button class="mode-btn" onclick="setGameMode('timeattack')">
                    <span class="mode-emoji">⏱️</span>
                    <span data-en="Time Attack" data-ar="هجوم الوقت">Time Attack</span>
                </button>
                <button class="mode-btn" onclick="setGameMode('spacerace')">
                    <span class="mode-emoji">🚀</span>
                    <span data-en="Space Race" data-ar="سباق الفضاء">Space Race</span>
                </button>
                <button class="mode-btn uae-highlight" onclick="setGameMode('uaeheritage')">
                    <span class="mode-emoji">🇦🇪</span>
                    <span data-en="UAE Heritage" data-ar="التراث الإماراتي">UAE Heritage</span>
                </button>
            </div>

            <div class="grade-selector">
                <button class="grade-btn" onclick="changeGrade(4)">Grade 4</button>
                <button class="grade-btn active" onclick="changeGrade(5)">Grade 5</button>
                <button class="grade-btn" onclick="changeGrade(6)">Grade 6</button>
                <button class="grade-btn" onclick="changeGrade(7)">Grade 7</button>
            </div>

            <div class="mode-display" id="modeDisplay">
                <div id="modeStatus">Classic Mode</div>
                <div id="modeDetails"></div>
            </div>

            <div class="game-area">
                <div class="question-box" id="question">
                    <span class="uae-flag-icon"></span>
                    Loading...
                    <span class="uae-flag-icon"></span>
                </div>

                <div class="options-grid" id="options"></div>
                <div class="feedback" id="feedback"></div>
            </div>

            <div class="character-bar">
                <div class="character-info">
                    <span>Current:</span>
                    <strong id="currentCharacterDisplay">🧑 Math Learner</strong>
                </div>
                <div class="character-info">
                    <span>Next:</span>
                    <span id="nextCharacter">🥷 Ninja (100 XP)</span>
                </div>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-avatar">🧠</div>
                <div>
                    <h3 data-en="AI Math Tutor" data-ar="مدرس الرياضيات">AI Math Tutor</h3>
                    <p data-en="Ask me about math!" data-ar="اسألني عن الرياضيات!">Ask me about math!</p>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-avatar">🧠</div>
                    <div class="message-content">
                        <span data-en="Welcome! We have over 500 questions across all grades!" 
                              data-ar="مرحباً! لدينا أكثر من 500 سؤال لجميع الصفوف!">
                            Welcome! We have over 500 questions across all grades!
                        </span>
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Ask me...">
                <button onclick="sendMessage()">➡️</button>
            </div>
        </div>
    </div>

            ],
            grade7: [

        const uaeQuestions = [
            { question: "🇦🇪 The UAE flag has 4 colors. What fraction is green?", options: ["1/4", "1/2", "3/4", "1/3"], answer: "1/4", topic: "fractions" },
            { question: "🇦🇪 Burj Khalifa has 163 floors. You visit 50. How many left?", options: ["113", "100", "120", "110"], answer: "113", topic: "subtraction" },
            { question: "🇦🇪 A Falcon flies 120 km in 2 hours. Speed per hour?", options: ["60 km/h", "50 km/h", "70 km/h", "65 km/h"], answer: "60 km/h", topic: "division" },
            { question: "🇦🇪 60% of UAE lives in Abu Dhabi & Dubai. If total 10 million, how many?", options: ["6 million", "5 million", "7 million", "6.5 million"], answer: "6 million", topic: "percentages" },
            { question: "🇦🇪 Sheikh Zayed Grand Mosque has 82 domes. If 1/2 white, how many white?", options: ["41", "42", "40", "39"], answer: "41", topic: "fractions" },
            { question: "🇦🇪 Date harvest: 3:2 ratio of Khalas to Medjool. Total 500 kg. How many kg Khalas?", options: ["300 kg", "200 kg", "250 kg", "350 kg"], answer: "300 kg", topic: "ratios" }
        ];

        function setGameMode(mode) {
            gameState.gameMode = mode;
            gameState.uaeMode = (mode === 'uaeheritage');
            
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            resetGameMode();
            updateModeDisplay();
            nextQuestion();
        }

        function resetGameMode() {
            switch(gameState.gameMode) {
                case 'suddendeath': gameState.lives = 3; break;
                case 'timeattack': gameState.timeBonus = 0; break;
                case 'spacerace': gameState.racePosition = 0; break;
            }
        }

        function updateModeDisplay() {
            const modeStatus = document.getElementById('modeStatus');
            const modeDetails = document.getElementById('modeDetails');
            
            if (gameState.gameMode === 'uaeheritage') {
                modeStatus.innerHTML = '🇦🇪 UAE Heritage Mode';
            } else if (gameState.gameMode === 'suddendeath') {
                modeStatus.innerHTML = '💀 Sudden Death Mode';
                modeDetails.innerHTML = `❤️ ${gameState.lives} lives left`;
            } else {
                modeStatus.innerHTML = gameState.gameMode.charAt(0).toUpperCase() + gameState.gameMode.slice(1) + ' Mode';
            }
        }

        function changeGrade(grade) {
            gameState.currentGrade = grade;
            document.querySelectorAll('.grade-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            nextQuestion();
        }

        function nextQuestion() {
            gameState.canAnswer = true;
            
            let questionPool;
            if (gameState.uaeMode) {
                questionPool = uaeQuestions;
            } else {
                questionPool = questionBank[`grade${gameState.currentGrade}`];
            }
            
            const randomIndex = Math.floor(Math.random() * questionPool.length);
            gameState.currentQuestion = questionPool[randomIndex];
            
            document.getElementById('question').innerHTML = gameState.currentQuestion.question;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            const shuffled = [...gameState.currentQuestion.options].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('feedback').textContent = '';
        }

        function checkAnswer(selected) {
            if (!gameState.canAnswer) return;
            
            gameState.canAnswer = false;
            const isCorrect = selected === gameState.currentQuestion.answer;
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.style.pointerEvents = 'none';
                if (btn.textContent === gameState.currentQuestion.answer) {
                    btn.classList.add('correct');
                } else if (btn.textContent === selected && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });
            
            handleGameMode(isCorrect);
            
            setTimeout(() => {
                nextQuestion();
            }, 1500);
        }

        function handleGameMode(isCorrect) {
            const bonus = characters[gameState.character]?.bonus || 1;
            
            if (isCorrect) {
                const points = Math.floor(10 * gameState.level * bonus);
                gameState.score += points;
                gameState.streak++;
                gameState.characterXP += 5;
                gameState.questionsDone++;
                document.getElementById('feedback').textContent = `✅ Correct! +${points} points!`;
                
                if (gameState.gameMode === 'spacerace') {
                    gameState.racePosition++;
                    if (gameState.racePosition >= gameState.raceTotal) {
                        gameState.score += 100;
                        document.getElementById('feedback').textContent = '🎉 Race Won! +100!';
                    }
                }
            } else {
                gameState.streak = 0;
                document.getElementById('feedback').textContent = '❌ Try again!';
                
                if (gameState.gameMode === 'suddendeath') {
                    gameState.lives--;
                    if (gameState.lives <= 0) {
                        document.getElementById('feedback').textContent = '💀 Game Over!';
                        resetGameMode();
                    }
                }
            }
            
            if (gameState.streak % 5 === 0 && gameState.streak > 0) {
                gameState.level++;
            }
            
            checkCharacterUnlocks();
            updateDisplay();
            updateModeDisplay();
        }

        function checkCharacterUnlocks() {
            if (gameState.characterXP >= 100 && !gameState.characterUnlocked.ninja) {
                gameState.characterUnlocked.ninja = true;
                gameState.character = 'ninja';
            }
            if (gameState.characterXP >= 500 && !gameState.characterUnlocked.wizard) {
                gameState.characterUnlocked.wizard = true;
                gameState.character = 'wizard';
            }
            if (gameState.characterXP >= 1000 && !gameState.characterUnlocked.legend) {
                gameState.characterUnlocked.legend = true;
                gameState.character = 'legend';
            }
        }

        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('streak').textContent = gameState.streak;
            document.getElementById('questionsDone').textContent = gameState.questionsDone;
            
            const character = characters[gameState.character];
            document.getElementById('currentCharacterDisplay').textContent = `${character.emoji} ${character.name}`;
            
            const xpPercent = (gameState.characterXP / 1000) * 100;
            
            if (gameState.characterXP < 100) {
                document.getElementById('nextCharacter').textContent = `🥷 Ninja (${100 - gameState.characterXP} XP needed)`;
            } else if (gameState.characterXP < 500) {
                document.getElementById('nextCharacter').textContent = `🧙 Wizard (${500 - gameState.characterXP} XP needed)`;
            } else if (gameState.characterXP < 1000) {
                document.getElementById('nextCharacter').textContent = `👑 Legend (${1000 - gameState.characterXP} XP needed)`;
            } else {
                document.getElementById('nextCharacter').textContent = `👑 Max Level!`;
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            addUserMessage(message);
            input.value = '';
            
            setTimeout(() => {
                let response = "Try UAE Heritage Mode for questions about Burj Khalifa, Falcons, and Emirati culture!";
                addBotMessage(response);
            }, 1000);
        }

        function addUserMessage(text) {
            const messages = document.getElementById('chatMessages');
            messages.innerHTML += `<div class="message user"><div class="message-avatar">👤</div><div class="message-content">${text}</div></div>`;
            messages.scrollTop = messages.scrollHeight;
        }

        function addBotMessage(text) {
            const messages = document.getElementById('chatMessages');
            messages.innerHTML += `<div class="message bot"><div class="message-avatar">🧠</div><div class="message-content">${text}</div></div>`;
            messages.scrollTop = messages.scrollHeight;
        }

        nextQuestion();
    </script>
