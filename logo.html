<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkibidiMath.com - Fixed Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Logo Container */
        .logo-container {
            background: white;
            padding: 30px 50px;
            border-radius: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 4px solid #000;
            max-width: 1000px;
            width: 100%;
        }

        /* Main logo content */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* ---------- Khandoora Boy Character ---------- */
        .character {
            position: relative;
            width: 140px;
            height: 200px;
            animation: bounce 3s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Head */
        .boy-head {
            position: relative;
            width: 75px;
            height: 75px;
            background: #F5DEB3;  /* Skin tone */
            border-radius: 50%;
            margin: 0 auto;
            border: 3px solid #000;
            z-index: 5;
        }

        /* Face */
        .face {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .eyes {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-top: 25px;
        }

        .eye {
            width: 12px;
            height: 12px;
            background: #000;
            border-radius: 50%;
        }

        .smile {
            width: 30px;
            height: 8px;
            border-bottom: 4px solid #000;
            border-radius: 0 0 20px 20px;
            margin: 8px auto 0;
        }

        /* Ghutra (head covering) */
        .ghutra {
            position: absolute;
            top: -15px;
            left: -15px;
            width: 105px;
            height: 85px;
            background: white;
            border-radius: 45px 45px 20px 20px;
            transform: rotate(-3deg);
            border: 3px solid #000;
            z-index: 4;
        }

        /* Agal (black rope) */
        .agal {
            position: absolute;
            top: 10px;
            left: 5px;
            width: 85px;
            height: 12px;
            background: #222;
            border-radius: 20px;
            border: 2px solid #000;
            z-index: 6;
        }

        /* Kandoora body */
        .kandoora {
            position: relative;
            width: 105px;
            height: 125px;
            background: white;
            border: 3px solid #000;
            border-radius: 40px 40px 20px 20px;
            margin: -25px auto 0;
            z-index: 3;
            box-shadow: 0 8px 0 #e0e0e0;
        }

        /* Kandoora details */
        .collar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 12px;
            background: #f5f5f5;
            border: 2px solid #000;
            border-radius: 10px;
        }

        .pocket {
            position: absolute;
            bottom: 20px;
            right: 15px;
            width: 22px;
            height: 22px;
            border: 2px solid #000;
            border-radius: 6px;
        }

        .tassel {
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 15px;
            background: #f0f0f0;
            border: 2px solid #000;
            border-radius: 0 0 12px 12px;
        }

        /* ---------- Text Section ---------- */
        .text-section {
            text-align: center;
        }

        /* Math symbols row */
        .math-symbols {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .symbol-box {
            font-size: 2.2rem;
            font-weight: 800;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            border-radius: 15px;
            border: 3px solid #000;
            box-shadow: 0 5px 0 #aaa;
        }

        /* UAE flag colors on symbols */
        .symbol-box:nth-child(1) { background: #00968820; }  /* Green tint */
        .symbol-box:nth-child(2) { background: #FF000020; }  /* Red tint */
        .symbol-box:nth-child(3) { background: #00000020; }  /* Black tint */

        /* Main title - THIS IS THE FIXED PART */
        .title {
            font-family: 'Arial Black', 'Impact', sans-serif;
            line-height: 1.2;
            margin: 10px 0;
        }

        .skibidi {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #009688, #FF0000, #000000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.1);
            display: block;
        }

        .math-com {
            font-size: 3rem;
            font-weight: 800;
            color: #000;
            display: block;
            margin-top: -5px;
        }

        .math-com span {
            font-size: 1.8rem;
            color: #009688;
            font-weight: 600;
            margin-left: 5px;
        }

        /* UAE badge */
        .uae-badge {
            display: inline-block;
            background: #009688;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            border: 2px solid #000;
            box-shadow: 0 4px 0 #00695c;
            margin-top: 15px;
        }

        .uae-badge i {
            font-style: normal;
            background: white;
            color: #009688;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        /* Feature pills */
        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .pill {
            background: #FF0000;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 2px solid #000;
        }

        .pill.green {
            background: #009688;
        }

        .pill.black {
            background: #000;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .logo-container {
                padding: 20px;
            }
            
            .skibidi {
                font-size: 2.5rem;
            }
            
            .math-com {
                font-size: 2.2rem;
            }
            
            .character {
                width: 120px;
                height: 170px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo">
            <!-- Left: Kandoora Boy -->
            <div class="character">
                <!-- Ghutra and Agal -->
                <div class="ghutra"></div>
                <div class="agal"></div>
                
                <!-- Head -->
                <div class="boy-head">
                    <div class="face">
                        <div class="eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                        <div class="smile"></div>
                    </div>
                </div>
                
                <!-- Kandoora body -->
                <div class="kandoora">
                    <div class="collar"></div>
                    <div class="pocket"></div>
                    <div class="tassel"></div>
                </div>
            </div>

            <!-- Right: Text Section -->
            <div class="text-section">
                <!-- Math symbols -->
                <div class="math-symbols">
                    <div class="symbol-box">+</div>
                    <div class="symbol-box">×</div>
                    <div class="symbol-box">÷</div>
                </div>

                <!-- Main title - FIXED VERSION -->
                <div class="title">
                    <div class="skibidi">SKIBIDI</div>
                    <div class="math-com">MATH<span>.com</span></div>
                </div>

                <!-- UAE Badge -->
                <div class="uae-badge">
                    🇦🇪 UAE HERITAGE <i>AI</i>
                </div>

                <!-- Feature tags -->
                <div class="features">
                    <span class="pill green">Grades 4-7</span>
                    <span class="pill">2000+ Questions</span>
                    <span class="pill black">AI Tutor</span>
                    <span class="pill green">Character Unlocks</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
