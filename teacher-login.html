<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkibidiMath - Teacher Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-container h1 {
            color: #2d3748;
            margin-bottom: 10px;
        }

        .login-container p {
            color: #718096;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 3px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #4c51bf;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #4c51bf;
        }

        .signup-link {
            text-align: center;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #718096;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>👨‍🏫 Teacher Login</h1>
        <p>Sign in to access your dashboard</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="teacherEmail" placeholder="teacher@school.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="teacherPassword" placeholder="Enter your password">
        </div>

        <button class="btn-primary" onclick="loginTeacher()">Log In</button>

        <div class="signup-link">
            <a href="teacher-signup.html">Don't have an account? Sign up</a>
        </div>

        <div class="back-link">
            <a href="index.html">← Back to Join Game</a>
        </div>
    </div>

    <script>
        function loginTeacher() {
            const email = document.getElementById('teacherEmail').value.trim();
            const password = document.getElementById('teacherPassword').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            const teachers = JSON.parse(localStorage.getItem('teachers') || '{}');
            const teacher = teachers[email];

            if (!teacher || teacher.password !== password) {
                alert('Invalid email or password');
                return;
            }

            localStorage.setItem('currentTeacher', JSON.stringify(teacher));
            window.location.href = 'teacher-dashboard.html';
        }
    </script>
</body>
</html>
